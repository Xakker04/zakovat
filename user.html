<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zakovat Foydalanuvchi</title>
  <style>
    :root {
      --bg-a: #f6faf6;
      --bg-b: #deefe4;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --red: #d62828;
      --green: #2a9d8f;
      --brand: #0f766e;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      font-family: "Trebuchet MS", "Tahoma", sans-serif;
      background: radial-gradient(circle at 85% 15%, var(--bg-b), var(--bg-a) 62%);
    }

    .card {
      width: min(860px, 100%);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 26px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      letter-spacing: 0.4px;
    }

    .hint {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .hint a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 700;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    .timer-box {
      margin: 0 auto 18px;
      width: min(360px, 100%);
      border-radius: 14px;
      padding: 14px;
      background: linear-gradient(160deg, #ecfaf6, #dff4ed);
    }

    .timer-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .timer-value {
      font-size: clamp(34px, 7vw, 56px);
      font-weight: 800;
      color: var(--brand);
      line-height: 1;
    }

    .status {
      min-height: 34px;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .substatus {
      min-height: 22px;
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .teams {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 14px;
    }

    .team-btn {
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: clamp(24px, 3.2vw, 32px);
      font-weight: 700;
      padding: 30px 12px;
      cursor: pointer;
      transition: transform 130ms ease, filter 130ms ease;
    }

    .team-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .team-btn:disabled {
      opacity: 0.52;
      cursor: not-allowed;
      transform: none;
    }

    .red {
      background: var(--red);
    }

    .green {
      background: var(--green);
    }

    @media (max-width: 640px) {
      .teams {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Zakovat Foydalanuvchi Sahifasi</h1>
    <p class="hint">Admin panel: <a href="./index.html" target="_blank" rel="noopener noreferrer">index.html</a></p>
    <p class="hint" id="syncInfo"></p>

    <section class="timer-box">
      <div class="timer-label" id="timerLabel">Asosiy vaqt</div>
      <div class="timer-value" id="countdown">20s</div>
    </section>

    <div class="status" id="status">Adminni kutyapti</div>
    <p class="substatus" id="subStatus">Admin Enter tugmasi bilan raundni boshlasin.</p>

    <section class="teams">
      <button class="team-btn red" id="redBtn">Qizil jamoa</button>
      <button class="team-btn green" id="greenBtn">Yashil jamoa</button>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./sync.js"></script>
  <script>
    const redBtn = document.getElementById("redBtn");
    const greenBtn = document.getElementById("greenBtn");
    const timerLabelEl = document.getElementById("timerLabel");
    const countdownEl = document.getElementById("countdown");
    const statusEl = document.getElementById("status");
    const subStatusEl = document.getElementById("subStatus");
    const syncInfoEl = document.getElementById("syncInfo");

    const sync = window.ZakovatSync;
    const audio = window.ZakovatAudio || { play: () => {} };
    let state = sync.readState();

    function renderSyncInfo() {
      if (sync.syncMode === "cloud") {
        syncInfoEl.textContent = `Sync: CLOUD | room: ${sync.roomId}`;
      } else {
        syncInfoEl.textContent = "Sync: LOCAL (faqat shu brauzer). Turli brauzerlar uchun config.js ni sozlang.";
      }
    }

    function canPress() {
      return state.phase === "main_timer";
    }

    function sendPress(teamKey) {
      if (!canPress()) return;

      audio.play(teamKey === "red" ? "press_red" : "press_green");
      redBtn.disabled = true;
      greenBtn.disabled = true;
      subStatusEl.textContent = "Signal yuborildi, admin tasdiqlashi kutilyapti.";

      sync.sendCommand("TEAM_PRESS", { teamKey });
    }

    function playTransition(prevState, nextState) {
      if (!prevState || !nextState) return;

      if (prevState.phase !== "main_timer" && nextState.phase === "main_timer") {
        audio.play("start");
        return;
      }

      if (prevState.phase === "await_decision" && nextState.phase === "second_chance") {
        audio.play("wrong");
        return;
      }

      if (prevState.phase !== "finished" && nextState.phase === "finished") {
        const statusText = (nextState.status || "").toLowerCase();

        if (statusText.includes("to'g'ri")) {
          audio.play("correct");
          return;
        }

        if (statusText.includes("xato")) {
          audio.play("wrong");
          return;
        }

        if (statusText.includes("vaqt tugadi") || statusText.includes("vaqti tugadi")) {
          audio.play("timeout");
        }
      }
    }

    function render() {
      timerLabelEl.textContent = state.timerLabel || "Asosiy vaqt";
      countdownEl.textContent = `${Math.max(state.remaining || 0, 0)}s`;
      statusEl.textContent = state.status || "Adminni kutyapti";
      subStatusEl.textContent = state.subStatus || "Admin paneldan raundni boshlang.";

      const enabled = canPress();
      redBtn.disabled = !enabled;
      greenBtn.disabled = !enabled;
    }

    redBtn.addEventListener("click", () => sendPress("red"));
    greenBtn.addEventListener("click", () => sendPress("green"));

    sync.subscribe((message) => {
      if (message.kind !== "state") return;
      const previousState = state;
      state = message.state;
      playTransition(previousState, state);
      render();
    });

    renderSyncInfo();
    render();
  </script>
</body>
</html>
