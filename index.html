<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zakovat Admin</title>
  <style>
    :root {
      --bg-a: #f3f7fb;
      --bg-b: #dbe7f3;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --brand: #1e3a8a;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      font-family: "Trebuchet MS", "Tahoma", sans-serif;
      background: radial-gradient(circle at 10% 15%, var(--bg-b), var(--bg-a) 64%);
    }

    .card {
      width: min(820px, 100%);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 26px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      letter-spacing: 0.4px;
    }

    .hint {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .hint a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 700;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    .timer-box {
      margin: 0 auto 18px;
      width: min(360px, 100%);
      border-radius: 14px;
      padding: 14px;
      background: linear-gradient(160deg, #eef4fb, #e3edf8);
    }

    .timer-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .timer-value {
      font-size: clamp(34px, 7vw, 56px);
      font-weight: 800;
      color: var(--brand);
      line-height: 1;
    }

    .status {
      min-height: 34px;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .substatus {
      min-height: 22px;
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .admin-panel {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      background: #f9fcff;
    }

    .admin-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: #334155;
    }

    .admin-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }

    .admin-btn {
      border: none;
      border-radius: 10px;
      padding: 11px 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #334155;
      transition: filter 120ms ease;
    }

    .admin-btn:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .admin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .start {
      background: #1d4ed8;
    }

    .ok {
      background: #0f766e;
    }

    .wrong {
      background: #b45309;
    }

    .reset {
      background: #475569;
    }

    .shortcuts {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .admin-buttons {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Zakovat Admin Panel</h1>
    <p class="hint">Jamoa tugmalari foydalanuvchi sahifasida: <a href="./user.html" target="_blank" rel="noopener noreferrer">user.html</a></p>

    <section class="timer-box">
      <div class="timer-label" id="timerLabel">Asosiy vaqt</div>
      <div class="timer-value" id="countdown">20s</div>
    </section>

    <div class="status" id="status">Tayyor holat</div>
    <p class="substatus" id="subStatus">Admin Enter tugmasi bilan raundni boshlaydi.</p>

    <section class="admin-panel">
      <p class="admin-title">Admin boshqaruvi</p>
      <div class="admin-buttons">
        <button class="admin-btn start" id="startBtn">Start (Enter)</button>
        <button class="admin-btn ok" id="correctBtn">To'g'ri</button>
        <button class="admin-btn wrong" id="wrongBtn">Xato</button>
        <button class="admin-btn reset" id="resetBtn">Reset</button>
      </div>
      <p class="shortcuts">Tezkor tugmalar: Enter - start, R - reset.</p>
    </section>
  </main>

  <script src="./sync.js"></script>
  <script>
    const ROUND_SECONDS = 20;

    const timerLabelEl = document.getElementById("timerLabel");
    const countdownEl = document.getElementById("countdown");
    const statusEl = document.getElementById("status");
    const subStatusEl = document.getElementById("subStatus");
    const startBtn = document.getElementById("startBtn");
    const correctBtn = document.getElementById("correctBtn");
    const wrongBtn = document.getElementById("wrongBtn");
    const resetBtn = document.getElementById("resetBtn");

    const sync = window.ZakovatSync;
    let state = sync.defaultState();
    let timerId = null;

    const handledCommandIds = new Set();
    const handledQueue = [];

    function teamName(teamKey) {
      return teamKey === "red" ? "Qizil jamoa" : "Yashil jamoa";
    }

    function otherTeam(teamKey) {
      return teamKey === "red" ? "green" : "red";
    }

    function rememberCommand(commandId) {
      if (handledCommandIds.has(commandId)) {
        return false;
      }

      handledCommandIds.add(commandId);
      handledQueue.push(commandId);

      if (handledQueue.length > 200) {
        const oldest = handledQueue.shift();
        handledCommandIds.delete(oldest);
      }

      return true;
    }

    function render() {
      timerLabelEl.textContent = state.timerLabel;
      countdownEl.textContent = `${Math.max(state.remaining, 0)}s`;
      statusEl.textContent = state.status;
      subStatusEl.textContent = state.subStatus;

      const canJudge = state.phase === "await_decision" || state.phase === "second_chance";
      startBtn.disabled = !(state.phase === "idle" || state.phase === "finished");
      correctBtn.disabled = !canJudge;
      wrongBtn.disabled = !canJudge;

      if (state.phase === "await_decision") {
        wrongBtn.textContent = "Xato -> 2-jamoa";
      } else if (state.phase === "second_chance") {
        wrongBtn.textContent = "Xato (yakunla)";
      } else {
        wrongBtn.textContent = "Xato";
      }
    }

    function commit() {
      state.roundSeconds = ROUND_SECONDS;
      state = sync.publishState(state);
      render();
    }

    function stopTimer() {
      if (!timerId) return;
      clearInterval(timerId);
      timerId = null;
    }

    function startTimer(onExpire) {
      stopTimer();

      timerId = setInterval(() => {
        state.remaining -= 1;

        if (state.remaining <= 0) {
          state.remaining = 0;
          stopTimer();
          onExpire();
          return;
        }

        commit();
      }, 1000);
    }

    function setIdleState(message) {
      stopTimer();

      state = sync.defaultState();
      state.roundSeconds = ROUND_SECONDS;
      state.remaining = ROUND_SECONDS;
      state.phase = "idle";
      state.timerLabel = "Asosiy vaqt";
      state.status = "Tayyor holat";
      state.subStatus = message;
      state.firstTeamKey = null;
      state.secondTeamKey = null;

      commit();
    }

    function startRound() {
      if (state.phase !== "idle" && state.phase !== "finished") return;

      stopTimer();
      state.phase = "main_timer";
      state.remaining = ROUND_SECONDS;
      state.timerLabel = "Asosiy vaqt";
      state.status = "Raund boshlandi";
      state.subStatus = "Jamoalar foydalanuvchi sahifasidan tugma bosadi.";
      state.firstTeamKey = null;
      state.secondTeamKey = null;

      commit();

      startTimer(() => {
        state.phase = "finished";
        state.timerLabel = "Yakun";
        state.status = "Vaqt tugadi";
        state.subStatus = "Hech qaysi jamoa tugmani bosmadi.";
        commit();
      });
    }

    function onTeamPress(teamKey) {
      if (state.phase !== "main_timer") return;
      if (teamKey !== "red" && teamKey !== "green") return;

      stopTimer();
      state.phase = "await_decision";
      state.firstTeamKey = teamKey;
      state.secondTeamKey = otherTeam(teamKey);
      state.timerLabel = "To'xtagan vaqt";
      state.status = `${teamName(teamKey)} birinchi bosdi`;
      state.subStatus = "Admin javobni tekshirib To'g'ri yoki Xato bosing.";

      commit();
    }

    function startSecondChance() {
      if (!state.secondTeamKey) return;

      state.phase = "second_chance";
      state.remaining = ROUND_SECONDS;
      state.timerLabel = `${teamName(state.secondTeamKey)} vaqti`;
      state.status = `${teamName(state.firstTeamKey)} xato`;
      state.subStatus = `${teamName(state.secondTeamKey)}ga 20 soniya berildi.`;

      commit();

      startTimer(() => {
        state.phase = "finished";
        state.timerLabel = "Yakun";
        state.status = `${teamName(state.secondTeamKey)} vaqti tugadi`;
        state.subStatus = "Savol yopildi.";
        commit();
      });
    }

    function markCorrect() {
      if (state.phase !== "await_decision" && state.phase !== "second_chance") return;

      const isSecondChance = state.phase === "second_chance";
      const winnerKey = isSecondChance ? state.secondTeamKey : state.firstTeamKey;

      stopTimer();
      state.phase = "finished";
      state.timerLabel = "Yakun";
      state.status = `${teamName(winnerKey)} javobi to'g'ri`;
      state.subStatus = "Enter bilan keyingi savolni boshlang.";

      commit();
    }

    function markWrong() {
      if (state.phase === "await_decision") {
        startSecondChance();
        return;
      }

      if (state.phase === "second_chance") {
        stopTimer();
        state.phase = "finished";
        state.timerLabel = "Yakun";
        state.status = "Ikkala jamoa ham xato";
        state.subStatus = "Enter bilan keyingi savolni boshlang.";
        commit();
      }
    }

    function resetRound() {
      setIdleState("Reset qilindi. Enter bilan yangi raund boshlang.");
    }

    function onCommand(command) {
      if (!command || !command.id) return;
      if (!rememberCommand(command.id)) return;

      if (command.type === "TEAM_PRESS") {
        onTeamPress(command.payload && command.payload.teamKey);
      }
    }

    sync.subscribe((message) => {
      if (message.kind === "command") {
        onCommand(message.command);
      }
    });

    startBtn.addEventListener("click", startRound);
    correctBtn.addEventListener("click", markCorrect);
    wrongBtn.addEventListener("click", markWrong);
    resetBtn.addEventListener("click", resetRound);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        startRound();
        return;
      }

      if (event.key.toLowerCase() === "r") {
        event.preventDefault();
        resetRound();
      }
    });

    setIdleState("Admin Enter tugmasi bilan raundni boshlaydi.");
  </script>
</body>
</html>
